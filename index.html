<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestionnaire Boutique</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: var(--tg-theme-bg-color, #0b0b0e);
  --bg2: var(--tg-theme-secondary-bg-color, #13131a);
  --accent: #6C63FF;
  --accent-gradient: linear-gradient(135deg, #6C63FF, #8b5cf6);
  --accent2: #a78bfa;
  --text: var(--tg-theme-text-color, #f3f4f6);
  --sub: var(--tg-theme-hint-color, #9ca3af);
  --border: rgba(108, 99, 255, 0.15);
  --card: rgba(255, 255, 255, 0.03);
  --input-bg: rgba(255, 255, 255, 0.05);
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --radius: 18px;
  --radius-sm: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }

.screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: all 0.3s ease; overflow: hidden; }
.screen.hidden { opacity: 0; pointer-events: none; transform: translateY(15px); }
.scroll { flex: 1; overflow-y: auto; padding: 16px 16px 32px; -webkit-overflow-scrolling: touch; }
.scroll::-webkit-scrollbar { display: none; }

/* Écran Login */
#screen-login { background: linear-gradient(160deg, #0b0b0e 0%, #151026 100%); justify-content: center; align-items: center; padding: 24px; }
.login-box { width: 100%; max-width: 360px; }
.login-logo { width: 80px; height: 80px; border-radius: 24px; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 24px; box-shadow: 0 10px 30px rgba(108,99,255,0.3); }
.login-title { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 6px; letter-spacing: -0.5px; }
.login-sub { font-size: 14px; color: var(--sub); text-align: center; margin-bottom: 32px; }

.tab-switcher { display: flex; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; }
.tab-sw-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: none; color: var(--sub); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.tab-sw-btn.active { background: var(--accent-gradient); color: #fff; box-shadow: 0 4px 15px rgba(108,99,255,0.25); }
.form-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; backdrop-filter: blur(10px); }
.form-section { display: none; }
.form-section.active { display: block; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.field input, .field textarea, .field select { width: 100%; padding: 12px 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 15px; outline: none; transition: all 0.2s; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); background: rgba(108,99,255,0.05); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
.field textarea { min-height: 80px; resize: none; }
.field .hint { font-size: 12px; color: var(--sub); margin-top: 6px; opacity: 0.8; }

.btn-primary { width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); background: var(--accent-gradient); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(108,99,255,0.3); display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
.btn-primary:active { transform: scale(0.98); opacity: 0.9; }

.topbar { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); background: var(--bg2); }
.topbar-avatar { width: 42px; height: 42px; border-radius: 14px; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; font-size: 20px; }
.topbar-info { flex: 1; min-width: 0; }
.topbar-name { font-size: 16px; font-weight: 700; }
.topbar-status { font-size: 12px; margin-top: 2px; }
.topbar-logout { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--danger); padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }

.bottom-nav { display: flex; border-top: 1px solid var(--border); background: var(--bg2); padding-bottom: env(safe-area-inset-bottom, 0); }
.nav-btn { flex: 1; padding: 12px 4px 10px; background: none; border: none; color: var(--sub); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; transition: all 0.2s; }
.nav-btn span:first-child { font-size: 22px; transition: transform 0.2s; }
.nav-btn.active { color: var(--accent2); }
.nav-btn.active span:first-child { transform: scale(1.15); }

.page { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.page.active { display: flex; }
.page-header { padding: 8px 0 16px; display: flex; align-items: center; justify-content: space-between; }
.page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.page-sub { font-size: 13px; color: var(--sub); }

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.stat-card { background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; display: flex; flex-direction: column; gap: 4px; }
.stat-num { font-size: 28px; font-weight: 800; color: var(--accent2); }
.stat-lbl { font-size: 12px; color: var(--sub); font-weight: 500; }

.list-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: background 0.1s; }
.list-item:active { background: rgba(255,255,255,0.02); }
.list-item:last-child { border-bottom: none; }
.item-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.1); }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.item-meta { font-size: 12px; color: var(--sub); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

.item-actions { display: flex; gap: 8px; z-index: 2; }
.icon-btn { width: 34px; height: 34px; border-radius: 10px; border: 1px solid transparent; background: rgba(255,255,255,0.04); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.icon-btn.edit { color: var(--accent2); border-color: rgba(108,99,255,0.2); }
.icon-btn.edit:active { background: rgba(108,99,255,0.15); }
.icon-btn.del { color: var(--danger); border-color: rgba(239,68,68,0.2); }
.icon-btn.del:active { background: rgba(239,68,68,0.15); }

.profile-hero { background: linear-gradient(135deg, rgba(108,99,255,0.1) 0%, rgba(139,92,246,0.03) 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; text-align: center; margin-bottom: 16px; }
.profile-avatar { width: 70px; height: 70px; border-radius: 22px; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 14px; box-shadow: 0 8px 25px rgba(108,99,255,0.2); }
.profile-name { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.profile-desc { font-size: 14px; color: var(--sub); line-height: 1.4; }

.badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 10px; }
.badge.pending { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.2); }
.badge.approved { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
.badge.rejected { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }

.info-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px; }
.info-cell { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; }
.info-cell .lbl { font-size: 11px; color: var(--sub); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.info-cell .val { font-size: 15px; font-weight: 600; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; backdrop-filter: blur(5px); }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: #121218; border-top: 1px solid var(--border); border-radius: 24px 24px 0 0; width: 100%; padding: 20px 20px 32px; max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 40px; height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; margin: 0 auto 20px; }
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

.btn-danger { width: 100%; padding: 14px; border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius-sm); background: rgba(239,68,68,0.08); color: var(--danger); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
.btn-danger:active { background: rgba(239,68,68,0.15); }
.btn-cancel { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--sub); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }

.fab { position: sticky; bottom: 0; display: flex; justify-content: flex-end; padding-top: 10px; pointer-events: none; }
.fab-btn { pointer-events: auto; background: var(--accent-gradient); color: #fff; border: none; border-radius: 14px; padding: 12px 20px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 6px 20px rgba(108,99,255,0.4); transition: transform 0.2s; }
.fab-btn:active { transform: scale(0.95); }

.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 16px; text-align: center; color: var(--sub); }
.empty-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
.empty-text { font-size: 14px; }

.toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1c1c24; border: 1px solid var(--border); color: var(--text); padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; z-index: 999; pointer-events: none; opacity: 0; transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.loader-overlay { position: fixed; inset: 0; background: rgba(11,11,14,0.85); display: flex; align-items: center; justify-content: center; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(3px); }
.loader-overlay.show { opacity: 1; pointer-events: all; }
.spinner { width: 42px; height: 42px; border: 3px solid rgba(108,99,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ÉCRAN CONNEXION / INSCRIPTION -->
<div class="screen" id="screen-login">
  <div class="login-box">
    <div class="login-logo"><img src="./logo.png" alt="logo"></div>
    <div class="login-title">Bot Vendeur</div>
    <div class="login-sub">Gérez votre catalogue en direct sur Telegram</div>
    <div class="tab-switcher">
      <button class="tab-sw-btn active" id="btn-tab-login" onclick="switchAuthTab('login')">Connexion</button>
      <button class="tab-sw-btn" id="btn-tab-register" onclick="switchAuthTab('register')">Créer un compte</button>
    </div>
    <div class="form-card">
      <div class="form-section active" id="fs-login">
        <div class="field">
          <label>Mot de passe de la boutique</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-primary" onclick="seConnecter()">🔑 Me connecter</button>
      </div>
      <div class="form-section" id="fs-register">
        <div class="field"><label>Nom de la boutique *</label><input type="text" id="reg-nom" placeholder="Ex: Mon Shop Magique"></div>
        <div class="field"><label>Description</label><textarea id="reg-desc" placeholder="Ce que vous vendez..."></textarea></div>
        <div class="field"><label>Téléphone *</label><input type="tel" id="reg-tel" placeholder="Ex: 0977196639"></div>
        <div class="field"><label>Adresse *</label><input type="text" id="reg-adr" placeholder="Ex: Gombe, Ville"></div>
        <div class="field"><label>Mot de passe *</label><input type="password" id="reg-password" placeholder="Min. 4 caractères"></div>
        <button class="btn-primary" onclick="sInscrire()">🚀 Créer la boutique</button>
      </div>
    </div>
  </div>
</div>

<!-- ÉCRAN PRINCIPAL D'ADMINISTRATION -->
<div class="screen hidden" id="screen-main">
  <div class="topbar">
    <div class="topbar-avatar">🏪</div>
    <div class="topbar-info">
      <div class="topbar-name" id="topbar-shop">Chargement...</div>
      <div class="topbar-status" id="topbar-status">Vérification...</div>
    </div>
    <button class="topbar-logout" onclick="seDeconnecter()">Quitter</button>
  </div>

  <div style="flex:1; overflow:hidden; display:flex; flex-direction:column">
    <!-- PAGE 1 : PROFIL & STATS -->
    <div class="page active" id="page-profil">
      <div class="scroll">
        <div class="page-header">
          <div><div class="page-title">Tableau de bord</div><div class="page-sub">Vue d'ensemble de votre activité</div></div>
        </div>
        <div id="profil-content"></div>
      </div>
    </div>

    <!-- PAGE 2 : GESTION DES CATÉGORIES -->
    <div class="page" id="page-categories">
      <div class="scroll">
        <div class="page-header">
          <div><div class="page-title">Catégories</div><div class="page-sub" id="cat-count">0 catégorie</div></div>
        </div>
        <div class="card" id="liste-categories-wrap">
          <div id="liste-categories"></div>
        </div>
        <div class="fab"><button class="fab-btn" onclick="openAddCategory()"><span>➕</span> Nouvelle catégorie</button></div>
      </div>
    </div>

    <!-- PAGE 3 : GESTION DES PRODUITS -->
    <div class="page" id="page-produits">
      <div class="scroll">
        <div class="page-header">
          <div><div class="page-title">Produits</div><div class="page-sub" id="prod-count">0 produit</div></div>
        </div>
        <div class="card" id="liste-produits-wrap">
          <div id="liste-produits"></div>
        </div>
        <div class="fab"><button class="fab-btn" onclick="openAddProduct()"><span>➕</span> Nouveau produit</button></div>
      </div>
    </div>
  </div>

  <!-- MENU DE NAVIGATION BAS -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-profil" onclick="showPage('profil')"><span>👤</span><span>Profil</span></button>
    <button class="nav-btn" id="nav-categories" onclick="showPage('categories')"><span>🗂️</span><span>Catégories</span></button>
    <button class="nav-btn" id="nav-produits" onclick="showPage('produits')"><span>📦</span><span>Produits</span></button>
  </div>
</div>

<!-- MODALE UNIQUE POUR CRUD ET DÉTAILS -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Action</div>
    <div id="modal-body"></div>
    <button class="btn-primary" id="modal-ok" style="display: none;">Enregistrer</button>
    <button class="btn-cancel" onclick="closeModal()">Fermer</button>
  </div>
</div>

<div class="loader-overlay" id="loader"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
const N8N_WEBHOOK = 'https://auto.jessydjonga.site/webhook/tma-vendeur';
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const chatId = tg?.initDataUnsafe?.user?.id?.toString() || 'test_123456';

let profile = null;
let categories = [];   // tableau d'objets { nom }
let produits = [];     // tableau d'objets { nom, prix, description, taille } (pas d'id)

// --- Utilitaires ---
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

function loader(show) {
  document.getElementById('loader').classList.toggle('show', show);
}

function escHtml(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Normalise une réponse pour extraire un tableau (gère les formats courants de n8n)
function normalizeArray(data) {
  if (Array.isArray(data)) return data;
  if (data && typeof data === 'object') {
    // Propriétés possibles : data, rows, results, categories, products, etc.
    if (Array.isArray(data.data)) return data.data;
    if (Array.isArray(data.rows)) return data.rows;
    if (Array.isArray(data.results)) return data.results;
    if (Array.isArray(data.categories)) return data.categories;
    if (Array.isArray(data.products)) return data.products;
    // Sinon, essayer la première valeur qui est un tableau
    for (let key in data) {
      if (Array.isArray(data[key])) return data[key];
    }
  }
  return [];
}

// API générique
async function api(action, payload = {}) {
  try {
    const res = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId, action, ...payload })
    });
    const data = await res.json();
    console.log(`[API ${action}] réponse:`, data);
    return data;
  } catch(e) {
    console.error(`[API ${action}] erreur:`, e);
    return { error: 'Erreur réseau' };
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('hidden', s.id !== id));
}

function switchAuthTab(tab) {
  document.getElementById('btn-tab-login').classList.toggle('active', tab==='login');
  document.getElementById('btn-tab-register').classList.toggle('active', tab==='register');
  document.getElementById('fs-login').classList.toggle('active', tab==='login');
  document.getElementById('fs-register').classList.toggle('active', tab==='register');
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
}

async function seConnecter() {
  const pwd = document.getElementById('login-password').value;
  if (!pwd) { toast('⚠️ Entrez votre mot de passe'); return; }
  loader(true);
  const r = await api('login', { password: pwd });
  loader(false);
  if (r && r.success) {
    toast('✅ Connexion réussie !');
    await initMainScreen();
  } else {
    toast('❌ Mot de passe incorrect');
  }
}

async function sInscrire() {
  const nom = document.getElementById('reg-nom').value.trim();
  const tel = document.getElementById('reg-tel').value.trim();
  const adr = document.getElementById('reg-adr').value.trim();
  const pwd = document.getElementById('reg-password').value;
  if (!nom || !tel || !adr || !pwd) { toast('⚠️ Veuillez remplir tous les champs obligatoires'); return; }
  
  loader(true);
  const r = await api('register', {
    nom_boutique: nom,
    description: document.getElementById('reg-desc').value.trim() || null,
    telephone: tel,
    adresse: adr,
    password: pwd
  });
  loader(false);
  if (r && r.success) {
    toast('🎉 Compte créé avec succès !');
    await initMainScreen();
  } else {
    toast(r?.error || '⚠️ Échec de la création');
  }
}

async function initMainScreen() {
  showScreen('screen-main');
  loader(true);
  await chargerCategories();
  await chargerProduits();
  await chargerProfil();
  loader(false);
}

async function seDeconnecter() {
  loader(true);
  await api('logout');
  loader(false);
  profile = null; categories = []; produits = [];
  document.getElementById('login-password').value = '';
  showScreen('screen-login');
  toast('👋 À bientôt !');
}

// --- PROFIL ---
async function chargerProfil() {
  const d = await api('get_profile');
  if (!d || d.error || !d.nom_boutique) return;
  profile = d;
  
  document.getElementById('topbar-shop').textContent = d.nom_boutique;
  
  const statusMap = {
    'en_attente': { cls:'pending', txt:'⏳ En attente' },
    'approuvé': { cls:'approved', txt:'✅ Actif' },
    'approuve': { cls:'approved', txt:'✅ Actif' },
    'rejeté': { cls:'rejected', txt:'❌ Bloqué' },
    'rejete': { cls:'rejected', txt:'❌ Bloqué' }
  };
  const st = statusMap[(d.statut||'').toLowerCase()] || { cls:'pending', txt:'⏳ En attente' };
  document.getElementById('topbar-status').innerHTML = `<span class="badge ${st.cls}" style="margin:0; padding:2px 8px; font-size:11px">${st.txt}</span>`;
  
  document.getElementById('profil-content').innerHTML = `
    <div class="profile-hero">
      <div class="profile-avatar">🏪</div>
      <div class="profile-name">${escHtml(d.nom_boutique)}</div>
      <div class="profile-desc">${escHtml(d.description || 'Aucune description enregistrée.')}</div>
      <span class="badge ${st.cls}">${st.txt}</span>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${categories.length}</div><div class="stat-lbl">Catégories</div></div>
      <div class="stat-card"><div class="stat-num">${produits.length}</div><div class="stat-lbl">Produits Actifs</div></div>
    </div>
    <div class="info-grid">
      <div class="info-cell"><div class="lbl">📞 Téléphone</div><div class="val">${escHtml(d.telephone || '-')}</div></div>
      <div class="info-cell"><div class="lbl">📍 Adresse</div><div class="val">${escHtml(d.adresse || '-')}</div></div>
    </div>
  `;
}

// --- CATÉGORIES ---
async function chargerCategories() {
  const r = await api('list_categories');
  categories = normalizeArray(r);
  // S'assurer que chaque catégorie a un champ 'nom'
  categories = categories.filter(c => c && c.nom).map(c => ({ nom: c.nom }));
  
  document.getElementById('cat-count').textContent = categories.length + (categories.length > 1 ? ' catégories' : ' catégorie');
  
  const el = document.getElementById('liste-categories');
  if (!categories.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🗂️</div><div class="empty-text">Aucune catégorie.<br>Créez-en une avec le bouton +</div></div>`;
    return;
  }
  
  el.innerHTML = categories.map(c => `
    <div class="list-item" onclick="viewCategory('${escHtml(c.nom)}')">
      <div class="item-icon">🗂️</div>
      <div class="item-info">
        <div class="item-name">${escHtml(c.nom)}</div>
        <div class="item-meta">${produits.filter(p => p.categorie_nom === c.nom).length} produit(s)</div>
      </div>
      <div class="item-actions" onclick="event.stopPropagation()">
        <button class="icon-btn edit" onclick="openEditCategory('${escHtml(c.nom)}')">✏️</button>
        <button class="icon-btn del" onclick="openDeleteCategory('${escHtml(c.nom)}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

function viewCategory(nom) {
  document.getElementById('modal-title').innerHTML = `🗂️ Détail : ${escHtml(nom)}`;
  document.getElementById('modal-body').innerHTML = `
    <div style="padding: 8px 0">
      <p><strong>Nom :</strong> ${escHtml(nom)}</p>
      <p><strong>Produits associés :</strong> ${produits.filter(p => p.categorie_nom === nom).length}</p>
    </div>
  `;
  document.getElementById('modal-ok').style.display = 'none';
  document.getElementById('modal').classList.add('open');
}

function openAddCategory() {
  document.getElementById('modal-title').innerHTML = '🗂️ Créer une catégorie';
  document.getElementById('modal-body').innerHTML = `
    <div class="field"><label>Nom de la catégorie *</label><input type="text" id="m-cat-nom" placeholder="Ex: Beauté, Électronique"></div>
  `;
  document.getElementById('modal-ok').style.display = 'block';
  document.getElementById('modal-ok').className = 'btn-primary';
  document.getElementById('modal-ok').textContent = 'Créer';
  document.getElementById('modal-ok').onclick = async () => {
    const nom = document.getElementById('m-cat-nom').value.trim();
    if (!nom) { toast('⚠️ Le nom est requis'); return; }
    loader(true); closeModal();
    const r = await api('add_category', { nom });
    if (r && r.success) { toast('✅ Catégorie créée'); await initMainScreen(); }
    else { toast(r?.error || '⚠️ Erreur'); loader(false); }
  };
  document.getElementById('modal').classList.add('open');
}

function openEditCategory(oldNom) {
  document.getElementById('modal-title').innerHTML = '✏️ Éditer la catégorie';
  document.getElementById('modal-body').innerHTML = `
    <div class="field"><label>Nouveau nom *</label><input type="text" id="m-cat-nom" value="${escHtml(oldNom)}"></div>
  `;
  document.getElementById('modal-ok').style.display = 'block';
  document.getElementById('modal-ok').className = 'btn-primary';
  document.getElementById('modal-ok').textContent = 'Renommer';
  document.getElementById('modal-ok').onclick = async () => {
    const newNom = document.getElementById('m-cat-nom').value.trim();
    if (!newNom) { toast('⚠️ Le nom ne peut pas être vide'); return; }
    loader(true); closeModal();
    const r = await api('update_category', { oldNom, newNom });
    if (r && r.success) { toast('✅ Catégorie mise à jour'); await initMainScreen(); }
    else { toast(r?.error || '⚠️ Erreur'); loader(false); }
  };
  document.getElementById('modal').classList.add('open');
}

function openDeleteCategory(nom) {
  document.getElementById('modal-title').innerHTML = '🗑️ Supprimer la catégorie';
  document.getElementById('modal-body').innerHTML = `<p style="color:var(--sub); line-height:1.5">Supprimer la catégorie <strong>${escHtml(nom)}</strong> ? Les produits ne seront pas supprimés.</p>`;
  document.getElementById('modal-ok').style.display = 'block';
  document.getElementById('modal-ok').className = 'btn-danger';
  document.getElementById('modal-ok').textContent = '🗑️ Supprimer';
  document.getElementById('modal-ok').onclick = async () => {
    loader(true); closeModal();
    const r = await api('delete_category', { nom });
    if (r && r.success) { toast('🗑️ Catégorie supprimée'); await initMainScreen(); }
    else { toast(r?.error || '⚠️ Erreur'); loader(false); }
  };
  document.getElementById('modal').classList.add('open');
}

// --- PRODUITS ---
async function chargerProduits() {
  const r = await api('list_products');
  produits = normalizeArray(r);
  // Chaque produit doit avoir nom, prix, description, taille, et on ajoute categorie_nom si possible
  // Ici on suppose que le backend renvoie la catégorie associée (via jointure)
  produits = produits.filter(p => p && p.nom);
  
  document.getElementById('prod-count').textContent = produits.length + (produits.length > 1 ? ' produits' : ' produit');
  
  const el = document.getElementById('liste-produits');
  if (!produits.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Aucun produit.<br>Appuyez sur + pour ajouter.</div></div>`;
    return;
  }
  
  el.innerHTML = produits.map(p => `
    <div class="list-item" onclick="viewProduct('${escHtml(p.nom)}')">
      <div class="item-icon">📦</div>
      <div class="item-info">
        <div class="item-name">${escHtml(p.nom)}</div>
        <div class="item-meta">
          <span style="color:var(--accent2); font-weight:700">${parseFloat(p.prix || 0).toFixed(2)} $</span>
          ${p.taille ? '• ' + escHtml(p.taille) : ''}
          ${p.categorie_nom ? '• ' + escHtml(p.categorie_nom) : ''}
        </div>
      </div>
      <div class="item-actions" onclick="event.stopPropagation()">
        <button class="icon-btn edit" onclick="openEditProduct('${escHtml(p.nom)}')">✏️</button>
        <button class="icon-btn del" onclick="openDeleteProduct('${escHtml(p.nom)}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

async function viewProduct(nom) {
  // Récupérer les détails complets (si besoin)
  const p = produits.find(x => x.nom === nom);
  if (!p) return;
  document.getElementById('modal-title').innerHTML = `📦 ${escHtml(p.nom)}`;
  document.getElementById('modal-body').innerHTML = `
    <div style="padding: 8px 0">
      <p><strong>Nom :</strong> ${escHtml(p.nom)}</p>
      <p><strong>Prix :</strong> ${parseFloat(p.prix || 0).toFixed(2)} $</p>
      <p><strong>Taille :</strong> ${p.taille ? escHtml(p.taille) : '—'}</p>
      <p><strong>Catégorie :</strong> ${p.categorie_nom ? escHtml(p.categorie_nom) : 'Non spécifiée'}</p>
      <p><strong>Description :</strong><br>${p.description ? escHtml(p.description) : 'Aucune'}</p>
    </div>
  `;
  document.getElementById('modal-ok').style.display = 'none';
  document.getElementById('modal').classList.add('open');
}

function openAddProduct() {
  // Préparer la liste des catégories pour le select
  const catOptions = categories.map(c => `<option value="${escHtml(c.nom)}">${escHtml(c.nom)}</option>`).join('');
  document.getElementById('modal-title').innerHTML = '📦 Nouveau produit';
  document.getElementById('modal-body').innerHTML = `
    <div class="field"><label>Nom *</label><input type="text" id="m-p-nom" placeholder="Nom du produit"></div>
    <div class="field"><label>Catégorie *</label><select id="m-p-cat">${catOptions || '<option>Aucune catégorie</option>'}</select></div>
    <div class="field"><label>Prix ($) *</label><input type="number" id="m-p-prix" step="0.01" placeholder="0.00"></div>
    <div class="field"><label>Taille / Variante</label><input type="text" id="m-p-taille" placeholder="Ex: XL, 250ml"></div>
    <div class="field"><label>Description</label><textarea id="m-p-desc" placeholder="Description..."></textarea></div>
  `;
  document.getElementById('modal-ok').style.display = 'block';
  document.getElementById('modal-ok').className = 'btn-primary';
  document.getElementById('modal-ok').textContent = 'Ajouter';
  document.getElementById('modal-ok').onclick = async () => {
    const nom = document.getElementById('m-p-nom').value.trim();
    const cat = document.getElementById('m-p-cat').value;
    const prix = parseFloat(document.getElementById('m-p-prix').value);
    if (!nom || !cat || isNaN(prix)) { toast('⚠️ Nom, catégorie et prix requis'); return; }
    loader(true); closeModal();
    const r = await api('add_product', {
      nom,
      cat,          // le backend attend 'cat' (nom de la catégorie)
      prix,
      taille: document.getElementById('m-p-taille').value.trim() || null,
      desc: document.getElementById('m-p-desc').value.trim() || null
    });
    if (r && r.success) { toast('✅ Produit ajouté'); await initMainScreen(); }
    else { toast(r?.error || '⚠️ Erreur'); loader(false); }
  };
  document.getElementById('modal').classList.add('open');
}

function openEditProduct(oldNom) {
  const p = produits.find(x => x.nom === oldNom);
  if (!p) { toast('Produit introuvable'); return; }
  
  const catOptions = categories.map(c => `<option value="${escHtml(c.nom)}" ${c.nom === p.categorie_nom ? 'selected' : ''}>${escHtml(c.nom)}</option>`).join('');
  document.getElementById('modal-title').innerHTML = '✏️ Modifier le produit';
  document.getElementById('modal-body').innerHTML = `
    <div class="field"><label>Nom *</label><input type="text" id="m-p-nom" value="${escHtml(p.nom)}"></div>
    <div class="field"><label>Catégorie *</label><select id="m-p-cat">${catOptions}</select></div>
    <div class="field"><label>Prix ($) *</label><input type="number" id="m-p-prix" step="0.01" value="${p.prix}"></div>
    <div class="field"><label>Taille</label><input type="text" id="m-p-taille" value="${escHtml(p.taille||'')}"></div>
    <div class="field"><label>Description</label><textarea id="m-p-desc">${escHtml(p.description||'')}</textarea></div>
  `;
  document.getElementById('modal-ok').style.display = 'block';
  document.getElementById('modal-ok').className = 'btn-primary';
  document.getElementById('modal-ok').textContent = 'Enregistrer';
  document.getElementById('modal-ok').onclick = async () => {
    const newNom = document.getElementById('m-p-nom').value.trim();
    const cat = document.getElementById('m-p-cat').value;
    const prix = parseFloat(document.getElementById('m-p-prix').value);
    if (!newNom || !cat || isNaN(prix)) { toast('⚠️ Nom, catégorie et prix requis'); return; }
    loader(true); closeModal();
    const r = await api('update_product', {
      oldNom,
      nom: newNom,
      cat,          // backend attend 'cat'
      prix,
      taille: document.getElementById('m-p-taille').value.trim() || null,
      desc: document.getElementById('m-p-desc').value.trim() || null
    });
    if (r && r.success) { toast('✅ Produit modifié'); await initMainScreen(); }
    else { toast(r?.error || '⚠️ Erreur'); loader(false); }
  };
  document.getElementById('modal').classList.add('open');
}

function openDeleteProduct(nom) {
  document.getElementById('modal-title').innerHTML = '🗑️ Supprimer le produit';
  document.getElementById('modal-body').innerHTML = `<p style="color:var(--sub); line-height:1.5">Supprimer définitivement <strong>${escHtml(nom)}</strong> ?</p>`;
  document.getElementById('modal-ok').style.display = 'block';
  document.getElementById('modal-ok').className = 'btn-danger';
  document.getElementById('modal-ok').textContent = '🗑️ Supprimer';
  document.getElementById('modal-ok').onclick = async () => {
    loader(true); closeModal();
    const r = await api('delete_product', { nom });
    if (r && r.success) { toast('🗑️ Produit supprimé'); await initMainScreen(); }
    else { toast(r?.error || '⚠️ Erreur'); loader(false); }
  };
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  // Réinitialiser l'affichage du bouton
  setTimeout(() => {
    const btn = document.getElementById('modal-ok');
    btn.style.display = 'block';
    btn.className = 'btn-primary';
    btn.textContent = 'Enregistrer';
  }, 300);
}

// Fermeture au clic à l'extérieur
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// Démarrage automatique
(async () => {
  loader(true);
  const d = await api('get_profile');
  loader(false);
  if (d && !d.error && d.nom_boutique) {
    await initMainScreen();
  } else {
    showScreen('screen-login');
  }
})();
</script>
</body>
</html>
